    // ============================

    let activeTab = 'pantry';
    let pantry = ['pollo', 'broccoli', 'albumi', 'riso', 'tonno'];
    let macroFilter = 'all';
    let timingFilter = 'all';  // all | pre-workout | post-workout
    let sortMode = 'match';    // match | name | protein | calories
    let searchQuery = '';
    let weeklyPlan = {};
    let selectedRecipe = null;

    // ============================
    // UTILS
    // ============================
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function normalize(str) {
      return String(str || '').toLowerCase();
    }

    function filteredAndSuggestedRecipes() {
      let list = RECIPES_DB.map(recipe => {
        const owned = recipe.ingredients.filter(ing => pantry.includes(ing));
        const missing = recipe.ingredients.filter(ing => !pantry.includes(ing));
        const match = Math.round((owned.length / recipe.ingredients.length) * 100);
        return { ...recipe, ownedIngredients: owned, missingIngredients: missing, matchPercentage: match };
      });

      if (macroFilter !== 'all') {
        list = list.filter(r => r.tags.includes(macroFilter));
      }

      if (timingFilter !== 'all') {
        list = list.filter(r => r.tags.includes(timingFilter));
      }

      if (searchQuery.trim()) {
        const q = normalize(searchQuery);
        list = list.filter(r => {
          const inName = normalize(r.name).includes(q);
          const inIng = r.ingredients.some(ing => normalize(ing).includes(q));
          return inName || inIng;
        });
      }

      list = list.slice();
      if (sortMode === 'name') {
        list.sort((a, b) => a.name.localeCompare(b.name, 'it'));
      } else if (sortMode === 'protein') {
        list.sort((a, b) => b.macros.p - a.macros.p);
      } else if (sortMode === 'calories') {
        list.sort((a, b) => a.macros.kcal - b.macros.kcal);
      } else {
        list.sort((a, b) => b.matchPercentage - a.matchPercentage);
      }

      return list;
    }

    // ============================
    // RENDER
    // ============================
    function render() {
      renderMain();
      renderTabs();
    }

    function renderTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const tab = btn.getAttribute('data-tab');
        btn.classList.remove('tab-active');
        if (tab === activeTab) btn.classList.add('tab-active');
        btn.onclick = () => { activeTab = tab; render(); };
      });
    }

    function renderMain() {
      const main = document.getElementById('main-content');
      if (!main) return;

      let html = '';
      if (activeTab === 'pantry') html += buildPantrySection();
      else if (activeTab === 'recipes') html += buildRecipesSection();
      else if (activeTab === 'planner') html += buildPlannerSection();

      main.innerHTML = html;
      attachSectionEvents();
    }

      return `
        <section class="space-y-4">
          <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">
              I tuoi mattoni nutrizionali (Dispensa)
            </h2>
            <div class="flex gap-2 mb-4">
              <input id="input-pantry" type="text"
                placeholder="Es. pollo, tonno, albumi, riso..."
                class="flex-1 px-4 py-2 rounded-xl bg-slate-50 border border-slate-200 text-sm" />
              <button id="btn-add-pantry"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-xl font-bold text-sm">
                Aggiungi
              </button>
            </div>
            <div id="pantry-list" class="flex flex-wrap gap-2 text-xs"></div>
          </div>

          <div class="bg-gradient-to-br from-indigo-50 to-violet-50/50 p-5 rounded-3xl border border-indigo-100 flex items-center justify-between gap-4 shadow-sm">
            <div class="space-y-1">
              <div class="flex items-center gap-1.5 text-indigo-600 text-xs font-black uppercase tracking-wider">
                🎯 <span>Ottimizzazione Obiettivi</span>
              </div>
              <p class="text-slate-600 text-xs leading-relaxed max-w-sm">
                Aggiungi qui gli ingredienti che hai in frigo o dispensa: il planner ti suggerirà le ricette più adatte.
              </p>
            </div>
          </div>
        </section>
      `;
    }

    function renderPantryList() {
      const el = document.getElementById('pantry-list');
      if (!el) return;
      el.innerHTML = pantry.map(item => `
        <span class="inline-flex items-center gap-1 px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-xl text-[11px] font-bold uppercase tracking-wide">
          ${escapeHtml(item)}
          <button data-remove="${escapeHtml(item)}" class="text-slate-400 hover:text-red-500 text-[10px]">✕</button>
        </span>
      `).join('');

      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.getAttribute('data-remove');
          const idx = pantry.indexOf(val);
          if (idx >= 0) {
            pantry.splice(idx, 1);
            render();
          }
        });
      });
    }

    // ============================
    // RICETTE
    // ============================
    function buildFilterButtonsHtml() {
      const filters = [
        { label: 'Tutte', value: 'all' },
        { label: '💪 High Protein', value: 'high-protein' },
        { label: '🥑 Low Carb', value: 'low-carb' },
        { label: '🏃‍♂️ Low Fat', value: 'low-fat' }
      ];
      return filters.map(f => `
        <button data-filter="${f.value}"
          class="px-3 py-1.5 rounded-xl text-[11px] font-bold whitespace-nowrap border ${
            macroFilter === f.value
              ? 'bg-indigo-600 border-indigo-500 text-white shadow-sm shadow-indigo-100'
              : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300 hover:text-slate-700'
          }">
          ${escapeHtml(f.label)}
        </button>
      `).join('');
    }

    function buildTimingFilterButtonsHtml() {
      const options = [
        { label: 'Tutto', value: 'all' },
        { label: 'Pre-Workout', value: 'pre-workout' },
        { label: 'Post-Workout', value: 'post-workout' }
      ];
      return options.map(o => `
        <button data-timing="${o.value}"
          class="px-2.5 py-1 rounded-full text-[10px] font-semibold border ${
            timingFilter === o.value
              ? 'bg-emerald-600 border-emerald-500 text-white'
              : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300 hover:text-slate-700'
          }">
          ${escapeHtml(o.label)}
        </button>
      `).join('');
    }

    function buildSortSelectHtml() {
      return `
        <select id="select-sort"
          class="border border-slate-200 bg-white text-[11px] rounded-xl px-2 py-1 text-slate-600">
          <option value="match" ${sortMode === 'match' ? 'selected' : ''}>Match ingredienti</option>
          <option value="name" ${sortMode === 'name' ? 'selected' : ''}>Nome A-Z</option>
          <option value="protein" ${sortMode === 'protein' ? 'selected' : ''}>Proteine (↓)</option>
          <option value="calories" ${sortMode === 'calories' ? 'selected' : ''}>Calorie (↑)</option>
        </select>
      `;
    }

    function buildRecipesSection() {
      const recipes = filteredAndSuggestedRecipes();
      return `
        <section class="space-y-4">
          <div class="bg-white border border-slate-200 rounded-2xl p-3 shadow-sm space-y-2">
            <div class="flex gap-2 items-center">
              <div class="flex-1 relative">
                <input
                  id="input-search"
                  type="text"
                  value="${escapeHtml(searchQuery)}"
                  placeholder="Cerca per nome o ingrediente (es. tonno, avena, pre-workout)..."
                  class="w-full pl-3 pr-8 py-1.5 rounded-xl bg-slate-50 border border-slate-200 text-[11px] text-slate-700"
                />
                <span class="absolute right-2 top-1.5 text-slate-400 text-xs">🔍</span>
              </div>
              <div class="flex items-center gap-1">
                <span class="text-[10px] text-slate-400 font-semibold">Ordina:</span>
                ${buildSortSelectHtml()}
              </div>
            </div>
            <div class="flex justify-between items-center text-[10px] text-slate-400">
              <span>Risultati: ${recipes.length}</span>
              <button id="btn-clear-filters" class="underline hover:text-slate-600">
                Reset filtri
              </button>
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-none">
              ${buildFilterButtonsHtml()}
            </div>
            <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-none">
              ${buildTimingFilterButtonsHtml()}
            </div>
          </div>

          ${selectedRecipe ? buildSelectedRecipeCard(selectedRecipe) : ''}

          <div class="space-y-3">
            ${recipes.map(buildRecipeCardHtml).join('')}
          </div>
        </section>
      `;
    }

    function buildRecipeCardHtml(recipe) {
      return `
        <div class="bg-white border border-slate-200 p-4 rounded-3xl space-y-3 shadow-sm">
          <div class="flex justify-between items-start">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="text-[10px] bg-indigo-50 text-indigo-600 font-bold px-1.5 py-0.5 rounded border border-indigo-100">
                  ${recipe.matchPercentage}% Ingredienti
                </span>
                <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">
                  ${escapeHtml(recipe.type)}
                </span>
              </div>
              <h4 class="font-extrabold text-slate-900 text-sm">${escapeHtml(recipe.name)}</h4>
            </div>
            <div class="flex flex-col items-end gap-1">
              ${recipe.tags.includes('pre-workout') ? '<span class="text-[9px] bg-amber-50 text-amber-600 px-1.5 py-0.5 rounded-full border border-amber-100 font-semibold">PRE</span>' : ''}
              ${recipe.tags.includes('post-workout') ? '<span class="text-[9px] bg-emerald-50 text-emerald-600 px-1.5 py-0.5 rounded-full border border-emerald-100 font-semibold">POST</span>' : ''}
            </div>
          </div>
          <div class="grid grid-cols-4 gap-1 text-center bg-slate-50 p-2 rounded-xl text-[11px] font-semibold border border-slate-100">
            <div><span class="text-slate-400 block text-[9px] font-bold">P</span> <span class="text-indigo-600">${recipe.macros.p}g</span></div>
            <div><span class="text-slate-400 block text-[9px] font-bold">C</span> <span class="text-amber-600">${recipe.macros.c}g</span></div>
            <div><span class="text-slate-400 block text-[9px] font-bold">F</span> <span class="text-emerald-600">${recipe.macros.f}g</span></div>
            <div><span class="text-slate-400 block text-[9px] font-bold">KCAL</span> <span class="text-rose-600">${recipe.macros.kcal}</span></div>
          </div>
          <div class="text-[11px] text-slate-500 font-medium">
            ${recipe.missingIngredients.length > 0
              ? `<p><span class="text-rose-500 font-bold">Manca: </span>${escapeHtml(recipe.missingIngredients.join(', '))}</p>`
              : '<p class="text-emerald-600 font-semibold">Hai tutti gli ingredienti.</p>'}
          </div>
          <div class="flex gap-2">
            <button data-open-plan="${escapeHtml(recipe.name)}"
              class="flex-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-[11px] font-bold py-1.5 rounded-xl text-slate-600">
              Aggiungi al Piano
            </button>
            <button data-show-recipe="${recipe.id}"
              class="px-3 bg-indigo-600 hover:bg-indigo-700 text-white text-[11px] font-bold rounded-xl">
              Dettagli
            </button>
          </div>
          <div class="plan-dropdown hidden mt-2 bg-slate-50 border border-slate-200 p-2 rounded-xl grid grid-cols-2 gap-1">
            ${DAYS.map(day => `
              <div class="flex justify-between items-center p-1 bg-white rounded-lg border border-slate-100 shadow-sm">
                <span class="text-[10px] text-slate-500 font-bold">${escapeHtml(day.substring(0, 3))}</span>
                <div class="flex gap-1">
                  <button data-add="${escapeHtml(day)}-Pranzo-${escapeHtml(recipe.name)}"
                    class="p-1 bg-slate-50 rounded hover:bg-indigo-50 text-orange-500 border border-slate-100">☀️</button>
                  <button data-add="${escapeHtml(day)}-Cena-${escapeHtml(recipe.name)}"
                    class="p-1 bg-slate-50 rounded hover:bg-indigo-50 text-indigo-600 border border-slate-100">🌙</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function buildSelectedRecipeCard(recipe) {
      return `
        <div class="bg-gradient-to-b from-indigo-50/70 to-white border border-indigo-100 p-5 rounded-3xl shadow-md space-y-3 animate-scaleIn">
          <div class="flex justify-between items-start">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="bg-indigo-600 text-white text-[9px] font-black px-2 py-0.5 rounded-md uppercase tracking-wider">
                  RICETTA SELEZIONATA
                </span>
                <span class="bg-slate-100 text-slate-700 text-[9px] font-bold px-2 py-0.5 rounded-md uppercase">
                  ${escapeHtml(recipe.type)}
                </span>
              </div>
              <h3 class="text-lg font-black text-slate-900">${escapeHtml(recipe.name)}</h3>
              <p class="text-[11px] text-slate-500 mt-1">Difficoltà: ${escapeHtml(recipe.difficulty)}</p>
            </div>
            <button id="btn-close-selected" class="text-slate-400 hover:text-slate-600 text-sm">✕</button>
          </div>
          <div class="grid grid-cols-4 gap-2 text-center bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
            <div>
              <span class="text-[8px] font-black tracking-wider text-slate-400 block uppercase">PRO</span>
              <span class="text-xs font-black text-indigo-600">${recipe.macros.p} g</span>
            </div>
            <div>
              <span class="text-[8px] font-black tracking-wider text-slate-400 block uppercase">CARB</span>
              <span class="text-xs font-black text-amber-600">${recipe.macros.c} g</span>
            </div>
            <div>
              <span class="text-[8px] font-black tracking-wider text-slate-400 block uppercase">GRASSI</span>
              <span class="text-xs font-black text-emerald-600">${recipe.macros.f} g</span>
            </div>
            <div>
              <span class="text-[8px] font-black tracking-wider text-slate-400 block uppercase">CALORIE</span>
              <span class="text-xs font-black text-rose-600">${recipe.macros.kcal} kcal</span>
            </div>
          </div>
          <div class="text-[11px]">
            <div class="font-bold text-slate-600 mb-1">Ingredienti necessari:</div>
            <ul class="list-disc ml-4 space-y-0.5">
              ${recipe.ingredients.map(i => `<li>${escapeHtml(i)}</li>`).join('')}
            </ul>
          </div>
          <div class="text-[11px] text-slate-500">
            <p><span class="font-bold text-slate-600">Suggerimento:</span> usa questa ricetta come base e adatta le porzioni in base al tuo fabbisogno calorico giornaliero.</p>
          </div>
        </div>
      `;
    }

    // ============================
    // PLANNER
    // ============================
    function buildPlannerSection() {
      return `
        <section class="space-y-4">
          <div class="flex justify-between items-center">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-500">
              Pianificazione Allenamento & Nutrizione
            </h2>
            <button id="btn-clear-plan"
              class="text-[10px] bg-red-50 border border-red-200 text-red-600 font-bold px-2 py-1.5 rounded-md hover:bg-red-100">
              Svuota Piano
            </button>
          </div>
          <div class="space-y-3">
            ${DAYS.map(day => `
              <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-slate-50 px-4 py-2 border-b border-slate-200/80">
                  <span class="text-xs font-black text-indigo-600 uppercase tracking-wide">
                    ${escapeHtml(day)}
                  </span>
                </div>
                <div class="divide-y divide-slate-100 text-xs font-semibold">
                  ${MEAL_TYPES.map(type => {
                    const key = `${day}-${type}`;
                    const meal = weeklyPlan[key];
                    return `
                      <div class="px-4 py-3 flex justify-between items-center">
                        <span class="text-[10px] text-slate-400 font-bold uppercase w-20">
                          ${escapeHtml(type)}
                        </span>
                        <span class="${meal ? 'text-slate-800' : 'text-slate-400 italic'}">
                          ${meal ? escapeHtml(meal) : 'Riposo Nutrizionale'}
                        </span>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // ============================
    // EVENTI
    // ============================
    function attachSectionEvents() {
      // Dispensa
      if (activeTab === 'pantry') {
        const inputPantry = document.getElementById('input-pantry');
        const btnAddPantry = document.getElementById('btn-add-pantry');
        if (inputPantry && btnAddPantry) {
          btnAddPantry.addEventListener('click', () => {
            const v = inputPantry.value.trim().toLowerCase();
            if (v && !pantry.includes(v)) {
              pantry.push(v);
              inputPantry.value = '';
              render();
            }
          });
          inputPantry.addEventListener('keydown', e => {
            if (e.key === 'Enter') btnAddPantry.click();
          });
        }
        renderPantryList();
      }

      // Ricette
      if (activeTab === 'recipes') {
        const inputSearch = document.getElementById('input-search');
        if (inputSearch) {
          inputSearch.addEventListener('input', e => {
            searchQuery = e.target.value;
            renderMain();
          });
        }

        const selectSort = document.getElementById('select-sort');
        if (selectSort) {
          selectSort.addEventListener('change', e => {
            sortMode = e.target.value;
            renderMain();
          });
        }

        const btnClearFilters = document.getElementById('btn-clear-filters');
        if (btnClearFilters) {
          btnClearFilters.addEventListener('click', () => {
            macroFilter = 'all';
            timingFilter = 'all';
            sortMode = 'match';
            searchQuery = '';
            renderMain();
          });
        }

        document.querySelectorAll('[data-filter]').forEach(btn => {
          btn.addEventListener('click', () => {
            macroFilter = btn.getAttribute('data-filter');
            renderMain();
          });
        });

        document.querySelectorAll('[data-timing]').forEach(btn => {
          btn.addEventListener('click', () => {
            timingFilter = btn.getAttribute('data-timing');
            renderMain();
          });
        });

        document.querySelectorAll('[data-open-plan]').forEach(btn => {
          btn.addEventListener('click', () => {
            const panel = btn.nextElementSibling;
            document.querySelectorAll('.plan-dropdown').forEach(d => d.classList.add('hidden'));
            if (panel) panel.classList.toggle('hidden');
          });
        });

        document.querySelectorAll('[data-add]').forEach(btn => {
          btn.addEventListener('click', () => {
            const parts = btn.getAttribute('data-add').split('-');
            const day = parts[0];
            const meal = parts[1];
            const recipe = parts.slice(2).join('-');
            weeklyPlan[`${day}-${meal}`] = recipe;
            activeTab = 'planner';
            render();
          });
        });

        document.querySelectorAll('[data-show-recipe]').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = parseInt(btn.getAttribute('data-show-recipe'), 10);
            selectedRecipe = RECIPES_DB.find(r => r.id === id) || null;
            renderMain();
          });
        });

        const btnCloseSel = document.getElementById('btn-close-selected');
        if (btnCloseSel) {
          btnCloseSel.addEventListener('click', () => {
            selectedRecipe = null;
            renderMain();
          });
        }
      }

      // Planner
      if (activeTab === 'planner') {
        const btnClearPlan = document.getElementById('btn-clear-plan');
        if (btnClearPlan) {
          btnClearPlan.addEventListener('click', () => {
            weeklyPlan = {};
            render();
          });
        }
      }
    }

    // ============================
    // INIT
    // ============================
    document.addEventListener('DOMContentLoaded', () => {
      render();
    });
  </script>
</body>
</html>
